run_env: test
run_date: 2026-05-27
root_dir: test_data

datasets:
  - name: stock_list
    enabled: true

  - name: stock_st
    enabled: true
    params:
      start: 2026-05-27
      end: 2026-05-27

  - name: stock_daily
    enabled: true
    params:
      start: 2026-05-27
      end: 2026-05-27

  - name: etf_list
    enabled: true

  - name: market_bars_etf_daily
    enabled: true
    params:
      start: 2026-05-27
      end: 2026-05-27

  - name: index_list
    enabled: true
    params:
      markets:
        - SSE
        - SZSE
        - CSI

  - name: market_bars_index_daily
    enabled: true
    params:
      start: 2026-05-27
      end: 2026-05-27
      index_codes:
        # A股核心宽基
        - 000001.SH  # 上证指数
        - 000016.SH  # 上证50
        - 000010.SH  # 上证180
        - 000300.SH  # 沪深300
        - 000903.SH  # 中证A100
        - 000510.SH  # 中证A500
        - 000905.SH  # 中证500
        - 000906.SH  # 中证800
        - 000852.SH  # 中证1000
        - 399001.SZ  # 深证成指
        - 399330.SZ  # 深证100
        - 399006.SZ  # 创业板指
        - 399673.SZ  # 创业板50
        - 399303.SZ  # 国证2000
        # 科创与主题行业
        - 000688.SH  # 科创50
        - 000698.SH  # 科创100
        - 000699.SH  # 科创200
        - 399975.SZ  # 证券公司
        - 399986.SZ  # 中证银行
        - 399989.SZ  # 中证医疗
        - 399967.SZ  # 中证军工
        - 399808.SZ  # 中证新能
        - 399976.SZ  # CS新能车
        # 债券/国债/信用债代表指数
        - 000061.SH  # 上证企债30
        - 000140.CSI # 上证5年期国债ETF跟踪指数
        - 930916.CSI # 中证10年期国债
        - 931018.CSI # 中证5-10年期国债活跃券
        - 931552.CSI # 中证1-3年国债
        - 932200.CSI # 中证国债及政策性金融债0-3年
        - 950175.CSI # 上证30年期国债
        - 950243.CSI # 上证基准做市国债
        - 950245.CSI # 上证基准做市公司债
        - H01077.CSI # 上证10年期国债
        - H11077.CSI # 上证10年期国债全收益

  - name: future_list
    enabled: false
    params:
      exchanges:
        - CFFEX
        - DCE
        - CZCE
        - SHFE
        - INE
        - GFEX

  - name: market_bars_future_daily
    enabled: true
    params:
      start: 2026-05-27
      end: 2026-05-27
